# DevSecOps Pipeline for SurvivalTrait Website
# This workflow runs SAST, DAST, SCA, and enforces change management best practices

name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans weekly on Sundays at 2 AM
    - cron: '0 2 * * 0'

jobs:
  # Job 1: SAST - Static Application Security Testing
  sast-scan:
    name: SAST - Semgrep Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/javascript
            p/html
          generateSarif: true
      
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Job 2: Secret Scanning
  secret-scan:
    name: Secret & Credential Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # Job 3: Dependency Scanning (SCA)
  dependency-scan:
    name: SCA - Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 4: Code Quality & Linting
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install HTMLHint
        run: npm install -g htmlhint
      
      - name: Lint HTML files
        run: htmlhint "**/*.html"
        continue-on-error: true
      
      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard
      
      - name: Create stylelint config
        run: |
          cat > .stylelintrc.json << 'STYLELINT_EOF'
          {
            "extends": "stylelint-config-standard",
            "rules": {
              "selector-class-pattern": null
            }
          }
          STYLELINT_EOF
      
      - name: Lint CSS files
        run: stylelint "**/*.css"
        continue-on-error: true

  # Job 5: Build & Test
  build-test:
    name: Build & Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./
      
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.html' './**/*.md'
          fail: true

  # Security Summary Job
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scan, dependency-scan, code-quality]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "## 🛡️ DevSecOps Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Scans Completed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SAST (Static Application Security Testing)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Scanning" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SCA (Software Composition Analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the detailed results in the workflow tabs above." >> $GITHUB_STEP_SUMMARY
